<!DOCTYPE html>
<html lang="en">
<head>

    <meta property="og:title" content="Portfolio - SwitDeveloper">
    <meta property="og:description" content="See our latest projects and case studies.">

    <meta name="twitter:card" content="summary_large_image">
    <link rel="canonical" href="https://switdeveloper.top/portfolio.html">
    <title>Portfolio | SwitDeveloper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; color: #333; }
        h1, h2, h3, h4, h5, h6, .serif { font-family: 'Playfair Display', serif; }
        .bg-dark-blue { background-color: #0d152e; }
        .text-dark-blue { color: #0d152e; }
        .bg-primary-red { background-color: #c91414; }
        .text-primary-red { color: #c91414; }
        .border-primary-red { border-color: #c91414; }
        .reveal { opacity:0; transform:translateY(40px); transition:opacity 0.7s ease-out, transform 0.7s ease-out; }
        .reveal.visible { opacity:1; transform:translateY(0); }
        .delay-100 { transition-delay:0.1s; }
        .delay-200 { transition-delay:0.2s; }
        .delay-300 { transition-delay:0.3s; }
        .project-card { transition: all 0.3s ease; }
        .project-card:hover { transform: translateY(-6px); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .filter-btn.active { background: #c91414 !important; color: white !important; border-color: #c91414 !important; }
    </style>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <script src="js/load-partials.js"></script>
</head>
<body class="overflow-x-hidden">
    <div id="header-container"></div>

    <section class="relative bg-[#0d152e] pt-20 pb-32 overflow-hidden">
        <div class="absolute inset-0 z-0">
            <div class="absolute top-20 -left-20 w-80 h-80 bg-primary-red/10 rounded-full blur-3xl"></div>
            <div class="absolute bottom-0 right-0 w-96 h-96 bg-blue-500/10 rounded-full blur-3xl"></div>
        </div>
        <div class="max-w-7xl mx-auto px-4 relative z-10">
            <div class="max-w-3xl">
                <div class="flex items-center text-[10px] text-gray-400 mb-6 uppercase tracking-wider">
                    <span class="hover:text-white cursor-pointer" onclick="window.location='index.html'">Home</span> <span class="mx-2">/</span> <span class="text-white">Portfolio</span>
                </div>
                <h1 class="reveal text-5xl md:text-7xl font-bold mb-4 leading-[1.1] serif text-white">Our <span class="text-primary-red">Work</span></h1>
                <p class="reveal delay-100 text-lg text-gray-300 mb-8 leading-relaxed font-light max-w-2xl">Real projects, real results. Browse our case studies across digital marketing, web development, AI automation, and more.</p>
            </div>
        </div>
    </section>

    <section class="py-16 bg-gray-50 -mt-20 relative z-20">
        <div class="max-w-7xl mx-auto px-4">
            <div class="reveal flex flex-wrap gap-2 mb-10 justify-center">
                <button class="filter-btn active bg-white border border-gray-200 text-gray-600 px-5 py-2 rounded-full text-sm font-medium hover:bg-gray-100 transition" data-filter="all">All</button>
                <button class="filter-btn bg-white border border-gray-200 text-gray-600 px-5 py-2 rounded-full text-sm font-medium hover:bg-gray-100 transition" data-filter="web">Web Development</button>
                <button class="filter-btn bg-white border border-gray-200 text-gray-600 px-5 py-2 rounded-full text-sm font-medium hover:bg-gray-100 transition" data-filter="marketing">Digital Marketing</button>
                <button class="filter-btn bg-white border border-gray-200 text-gray-600 px-5 py-2 rounded-full text-sm font-medium hover:bg-gray-100 transition" data-filter="ai">AI Automation</button>
                <button class="filter-btn bg-white border border-gray-200 text-gray-600 px-5 py-2 rounded-full text-sm font-medium hover:bg-gray-100 transition" data-filter="mobile">Mobile Apps</button>
            </div>

            <div id="projectsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>
        </div>
    </section>

    <section class="py-20 bg-dark-blue text-white relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full overflow-hidden leading-[0]">
            <svg class="relative block w-full h-[40px] md:h-[60px]" data-name="Layer 1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120" preserveAspectRatio="none">
                <path d="M1200 120L0 120 0 0 1200 120z" class="fill-gray-50"></path>
            </svg>
        </div>
        <div class="max-w-4xl mx-auto px-4 text-center relative z-10 pt-16">
            <div class="reveal">
                <h2 class="text-3xl md:text-5xl font-bold mb-6 serif">Want Results Like These?</h2>
                <p class="reveal delay-100 text-gray-300 mb-8 text-lg">Let's discuss how we can help your business grow.</p>
                <div class="reveal delay-200 flex flex-col sm:flex-row gap-4 justify-center">
                    <a href="contact.html" class="bg-primary-red text-white px-8 py-4 rounded-lg font-bold hover:bg-red-800 transition inline-flex items-center gap-2 shadow-lg">
                        <i class="fas fa-paper-plane"></i> Start Your Project
                    </a>
                    <a href="pricing.html" class="border border-gray-400 text-white px-8 py-4 rounded-lg font-bold hover:bg-white/10 transition inline-flex items-center gap-2">
                        <i class="fas fa-tag"></i> View Pricing
                    </a>
                </div>
            </div>
        </div>
    </section>

    <div id="footer-container"></div>

<script>
const mobileMenuBtn = document.getElementById('mobileMenuBtn');
const mobileMenu = document.getElementById('mobileMenu');
if (mobileMenuBtn && mobileMenu) {
    mobileMenuBtn.addEventListener('click', () => {
        mobileMenu.classList.toggle('hidden');
        const icon = mobileMenuBtn.querySelector('i');
        icon.className = mobileMenu.classList.contains('hidden') ? 'fas fa-bars fa-lg' : 'fas fa-times fa-lg';
    });
}
</script>

<script>
const projects = [
    { title: 'ShopEase E-Commerce', category: 'web', desc: 'Full-featured e-commerce platform with AI product recommendations, real-time inventory, and payment processing.', results: '300% increase in online sales', image: 'EC' },
    { title: 'GrowthHackers SEO', category: 'marketing', desc: 'Comprehensive SEO strategy including technical audit, content optimization, and link building campaign.', results: '450% organic traffic growth in 6 months', image: 'GH' },
    { title: 'MediAI Assistant', category: 'ai', desc: 'AI-powered medical appointment scheduling chatbot with NLP, insurance verification, and follow-up automation.', results: '80% reduction in admin calls', image: 'MA' },
    { title: 'FinTech Mobile App', category: 'mobile', desc: 'Cross-platform mobile banking app with biometric auth, real-time notifications, and budgeting tools.', results: '4.8 star rating, 100k+ downloads', image: 'FM' },
    { title: 'TechStart Rebrand', category: 'marketing', desc: 'Complete brand strategy overhaul including visual identity, content strategy, and multi-channel campaign.', results: '200% increase in brand awareness', image: 'TS' },
    { title: 'RealEstate Pro Platform', category: 'web', desc: 'Property listing platform with virtual tours, AI valuation tools, and automated lead capture.', results: '5,000+ listings in first month', image: 'RE' },
    { title: 'SupplyChain AI', category: 'ai', desc: 'Predictive analytics system for supply chain optimization using machine learning and real-time data.', results: '35% cost reduction in logistics', image: 'SC' },
    { title: 'FitLife Mobile App', category: 'mobile', desc: 'Fitness tracking app with AI-powered workout plans, nutrition tracking, and social features.', results: '50k active users in 3 months', image: 'FL' },
    { title: 'LocalBizz Marketing', category: 'marketing', desc: 'Local SEO and Google Business optimization for a multi-location retail chain.', results: '500% increase in local search visibility', image: 'LB' },
];

function renderProjects(filter) {
    const grid = document.getElementById('projectsGrid');
    const filtered = filter === 'all' ? projects : projects.filter(p => p.category === filter);
    grid.innerHTML = filtered.map(p => `
        <div class="project-card bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden reveal">
            <div class="h-48 bg-gradient-to-br from-dark-blue to-gray-800 flex items-center justify-center text-4xl font-bold text-white/20 tracking-wider">${p.image}</div>
            <div class="p-6">
                <span class="inline-block text-[10px] uppercase tracking-wider text-primary-red font-semibold mb-2">${p.category === 'web' ? 'Web Development' : p.category === 'marketing' ? 'Digital Marketing' : p.category === 'ai' ? 'AI Automation' : 'Mobile App'}</span>
                <h3 class="text-lg font-bold text-dark-blue mb-2">${p.title}</h3>
                <p class="text-sm text-gray-500 mb-4">${p.desc}</p>
                <div class="flex items-center gap-2 text-sm font-semibold text-green-600"><i class="fas fa-arrow-up"></i> ${p.results}</div>
            </div>
        </div>
    `).join('');
    setTimeout(() => {
        document.querySelectorAll('#projectsGrid .reveal').forEach(el => el.classList.add('visible'));
    }, 50);
}

document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderProjects(btn.dataset.filter);
    });
});

renderProjects('all');
</script>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const revealObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) entry.target.classList.add('visible');
        });
    }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });
    document.querySelectorAll('.reveal, .reveal-left, .reveal-right, .reveal-scale').forEach(el => {
        revealObserver.observe(el);
    });
});
</script>
</body>
</html>
