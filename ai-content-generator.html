  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', sans-serif;
      background: #f8f9fc;
      color: #1a1a2e;
    }
    .bg-brand-dark { background-color: #0d152e; }
    .bg-brand-primary { background-color: #c91414; }
    .text-brand-primary { color: #c91414; }
    .border-brand-primary { border-color: #c91414; }
    .hover\:bg-brand-primary-dark:hover { background-color: #a81010; }
    body.dark body { background: #0d152e; color: #e2e8f0; }

    /* Hero */
    .hero-gradient {
      background: linear-gradient(135deg, #0d152e 0%, #1a1f3a 50%, #0d152e 100%);
    }
    .hero-glow {
      box-shadow: 0 0 80px rgba(201, 20, 20, 0.15);
    }

    /* Content type cards */
    .type-card {
      background: #fff;
      border: 2px solid #e2e8f0;
      border-radius: 16px;
      padding: 1.5rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
    }
    .type-card:hover {
      border-color: #c91414;
      transform: translateY(-4px);
      box-shadow: 0 12px 30px rgba(201, 20, 20, 0.12);
    }
    .type-card.active {
      border-color: #c91414;
      background: #fff5f5;
      box-shadow: 0 0 0 3px rgba(201, 20, 20, 0.15);
    }
    .type-card .icon-wrap {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 0.75rem;
      font-size: 1.4rem;
      color: #c91414;
      background: #fef2f2;
      transition: 0.2s;
    }
    .type-card.active .icon-wrap {
      background: #c91414;
      color: #fff;
    }
    .type-card .label {
      font-weight: 600;
      font-size: 0.9rem;
      color: #1e293b;
    }
    .type-card.active .label { color: #c91414; }

    /* Form & Results */

      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    }
    .form-card { border: 1px solid #e2e8f0; }
    .form-label {
      display: block;
      font-weight: 600;
      font-size: 0.85rem;
      color: #334155;
      margin-bottom: 0.35rem;
    }
    .form-input, .form-select, .form-textarea {
      width: 100%;
      padding: 0.65rem 0.9rem;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      font-size: 0.9rem;
      transition: 0.2s;
      background: #fff;
      font-family: 'Inter', sans-serif;
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus {
      outline: none;
      border-color: #c91414;
      box-shadow: 0 0 0 3px rgba(201, 20, 20, 0.1);
    }
    .btn-primary {
      background: #c91414;
      color: #fff;
      border: none;
      padding: 0.75rem 2rem;
      border-radius: 10px;
      font-weight: 600;

      font-family: 'Inter', sans-serif;

    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-secondary {
      background: transparent;
      color: #334155;
      border: 1.5px solid #e2e8f0;

      border-radius: 10px;

    /* Result content */

      margin-top: 1.25rem;

    /* History */

      padding: 0.75rem 1rem;
      cursor: pointer;
      transition: 0.2s;
      border-radius: 0 8px 8px 0;

    /* Toast */
    #toast {
      position: fixed;
      bottom: 2rem;

      background: #0d152e;

      z-index: 9999;
      display: flex;
      align-items: center;

    }
    #toast.show { transform: translateY(0); opacity: 1; }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(4px);
      z-index: 9998;
      display: none;
      align-items: center;
      justify-content: center;

    .modal-overlay.open { display: flex; }
    .modal-box {

      border-radius: 20px;
      padding: 2rem;
      max-width: 480px;
      width: 90%;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);

    /* Loader */
    .spinner {
      width: 22px;
      height: 22px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: inline-block;

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Responsive */

    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  </style>

    <i class="fa-solid fa-arrow-up"></i>
  </button>

  <script>
    // ── Models ──
    const MODELS = [
      { id: 'nvidia/nemotron-3-ultra-550b-a55b:free', name: 'Nemotron 3 Ultra 550B (free)' },
      { id: 'nex-agi/nex-n2-pro:free', name: 'Nex N2 Pro (free)' },
      { id: 'nvidia/nemotron-3-nano-omni-30b-a3b-reasoning:free', name: 'Nemotron Nano Omni 30B (free)' }
    ];

    // ── Content Types ──
    const CONTENT_TYPES = [
      { id: 'blog',         label: 'Blog Post',          icon: 'fa-solid fa-blog' },
      { id: 'ad',           label: 'Ad Copy',            icon: 'fa-solid fa-ad' },
      { id: 'email',        label: 'Email Newsletter',   icon: 'fa-solid fa-envelope-open-text' },
      { id: 'social',       label: 'Social Caption',     icon: 'fa-solid fa-hashtag' },
      { id: 'product',      label: 'Product Description',icon: 'fa-solid fa-tag' },
      { id: 'landing',      label: 'Landing Page Copy',  icon: 'fa-solid fa-laptop-code' },
      { id: 'press',        label: 'Press Release',      icon: 'fa-solid fa-newspaper' },
      { id: 'video',        label: 'Video Script',       icon: 'fa-solid fa-video' }
    ];

    // ── Prompts ──
    function buildSystemPrompt(type, tone, length, audience, language) {
      const lengthGuide = { Short: '2–3 paragraphs', Medium: '4–6 paragraphs', Long: '7–12 paragraphs' };
      const lengthDesc = `Write approximately ${lengthGuide[length] || lengthGuide.Medium}.`;
      const audienceDesc = audience ? ` Target audience: ${audience}.` : '';
      return `You are an expert ${type} writer. Write in a ${tone.toLowerCase()} tone. ${lengthDesc}${audienceDesc} Output in ${language}. Use markdown formatting with headings where appropriate.`;
    }

    const TYPE_LABELS = {
      blog: 'a blog post', ad: 'an ad copy', email: 'an email newsletter',
      social: 'a social media caption', product: 'a product description',
      landing: 'a landing page copy', press: 'a press release', video: 'a video script'
    };

    // ── State ──
    let selectedType = null;
    let lastResult = '';
    let lastMeta = {};
    let isGenerating = false;

    // ── DOM refs ──
    const $ = id => document.getElementById(id);
    const typeGrid = $('type-grid');
    const formSection = $('form-section');
    const formTitle = $('form-title');
    const resultsSection = $('results-section');
    const loadingSection = $('loading-section');
    const resultContent = $('result-content');
    const resultMeta = $('result-meta');
    const historyList = $('history-list');
    const toast = $('toast');
    const toastMsg = $('toast-msg');
    const statusText = $('status-text');
    const scrollTop = $('scroll-top');

    // ── Init ──
    function init() {
      populateModels();
      populateTypeCards();
      populateLanguageSelectors();
      loadSettingsIntoUI();
      renderHistory();
      updateStatus();
    }

    function populateModels() {
      const selects = ['sidebar-model', 'modal-model'];
      selects.forEach(id => {
        const sel = $(id);
        if (!sel) return;
        sel.innerHTML = MODELS.map(m => `<option value="${m.id}">${m.name}</option>`).join('');
      });
    }

    function populateTypeCards() {
      typeGrid.innerHTML = CONTENT_TYPES.map(t => `
        <div class="type-card" data-type="${t.id}" onclick="selectType('${t.id}')">
          <div class="icon-wrap"><i class="${t.icon}"></i></div>
          <div class="label">${t.label}</div>
        </div>
      `).join('');
    }

    function populateLanguageSelectors() {
      const langs = ['English','Spanish','French','German','Italian','Portuguese','Dutch','Russian','Japanese','Korean','Chinese','Arabic','Hindi','Turkish'];
      const html = langs.map(l => `<option value="${l}">${l}</option>`).join('');
      const select1 = $('sidebar-language');
      const select2 = $('input-language-form');
      if (select1) select1.innerHTML = html;
      if (select2) select2.innerHTML = html;
      // Sync them
      if (select1 && select2) {
        select1.addEventListener('change', () => { select2.value = select1.value; });
        select2.addEventListener('change', () => { select1.value = select2.value; });
      }
    }

    // ── Settings ──
    function loadSettingsIntoUI() {
      const model = localStorage.getItem('orModel') || MODELS[0].id;
      if ($('modal-model')) $('modal-model').value = model;
      if ($('sidebar-model')) $('sidebar-model').value = model;
    }

    function updateStatus() {
      statusText.textContent = 'Ready to generate';
      statusText.style.color = '#16a34a';
    }

    function openSettings() {
      loadSettingsIntoUI();
      $('settings-modal').classList.add('open');
    }

    function closeSettings() {
      $('settings-modal').classList.remove('open');
    }

    function saveSettings() {
      const model = $('modal-model').value;
      localStorage.setItem('orModel', model);
      if ($('sidebar-model')) $('sidebar-model').value = model;
      updateStatus();
      closeSettings();
      showToast('Settings saved');
    }

    // ── Type Selection ──
    function selectType(type) {
      selectedType = type;
      document.querySelectorAll('.type-card').forEach(c => c.classList.remove('active'));
      document.querySelector(`.type-card[data-type="${type}"]`)?.classList.add('active');
      const ct = CONTENT_TYPES.find(t => t.id === type);
      formTitle.textContent = `Create ${ct ? ct.label : 'Content'}`;
      formSection.style.display = 'block';
      resultsSection.style.display = 'none';
      $('input-topic').focus();
      window.scrollTo({ top: formSection.offsetTop - 100, behavior: 'smooth' });
    }

    function resetForm() {
      selectedType = null;
      document.querySelectorAll('.type-card').forEach(c => c.classList.remove('active'));
      formSection.style.display = 'none';
      resultsSection.style.display = 'none';
      loadingSection.style.display = 'none';
      window.scrollTo({ top: $('type-grid').offsetTop - 100, behavior: 'smooth' });
    }

    // ── Generate ──
    async function generate() {
      const topic = $('input-topic').value.trim();
      if (!topic) {
        showToast('Please enter a topic or keywords');
        $('input-topic').focus();
        return;
      }

      if (isGenerating) return;
      isGenerating = true;

      const typeLabel = TYPE_LABELS[selectedType] || 'content';
      const tone = $('input-tone').value;
      const length = $('input-length').value;
      const audience = $('input-audience').value.trim();
      const language = $('input-language-form').value;
      const model = localStorage.getItem('orModel') || MODELS[0].id;

      const systemPrompt = buildSystemPrompt(typeLabel, tone, length, audience, language);
      const userPrompt = `Write ${typeLabel} about the following topic/area:\n\n${topic}`;

      // Show loader
      resultsSection.style.display = 'none';
      loadingSection.style.display = 'block';
      $('generate-btn').disabled = true;
      $('generate-btn').innerHTML = '<span class="spinner mr-2"></span>Generating...';

      try {
        const resp = await fetch('https://PROJECT_REF.supabase.co/functions/v1/openrouter-proxy/chat/completions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            model,
            messages: [
              { role: 'system', content: systemPrompt },
              { role: 'user', content: userPrompt }
            ],
            temperature: 0.7,
            max_tokens: length === 'Short' ? 512 : length === 'Medium' ? 1536 : 3072
          })
        });

        if (!resp.ok) {
          const err = await resp.json().catch(() => ({}));
          throw new Error(err.error?.message || `HTTP ${resp.status}: ${resp.statusText}`);
        }

        const data = await resp.json();
        const text = data.choices?.[0]?.message?.content || '';
        if (!text) throw new Error('No content returned');

        lastResult = text;
        const ct = CONTENT_TYPES.find(t => t.id === selectedType);
        lastMeta = {
          type: ct ? ct.label : selectedType,
          topic,
          tone,
          length,
          audience,
          language,
          model,
          timestamp: new Date().toISOString()
        };

        displayResult(text, lastMeta);
        saveToHistory(text, lastMeta);
        renderHistory();

      } catch (err) {
        showToast('Error: ' + err.message);
        loadingSection.style.display = 'none';
      } finally {
        isGenerating = false;
        $('generate-btn').disabled = false;
        $('generate-btn').innerHTML = '<i class="fa-solid fa-wand-magic-sparkles mr-2"></i>Generate Content';
      }
    }

    function displayResult(text, meta) {
      loadingSection.style.display = 'none';
      resultContent.innerHTML = text;
      resultMeta.textContent = `${meta.type} · ${meta.language} · ${meta.tone} · ${meta.model.split('/')[1] || meta.model}`;
      resultsSection.style.display = 'block';
      setTimeout(() => resultsSection.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
    }

    function copyResult() {
      if (!lastResult) return;
      navigator.clipboard.writeText(lastResult).then(() => {
        showToast('Copied to clipboard!');
      }).catch(() => {
        // Fallback
        const ta = document.createElement('textarea');
        ta.value = lastResult;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        showToast('Copied to clipboard!');
      });
    }

    function regenerate() {
      if (selectedType && $('input-topic').value.trim()) {
        generate();
      } else {
        showToast('Please select a type and enter a topic first');
      }
    }

    // ── History ──
    function getHistory() {
      try { return JSON.parse(localStorage.getItem('contentGenHistory') || '[]'); } catch { return []; }
    }

    function saveToHistory(text, meta) {
      const history = getHistory();
      history.unshift({ text, meta, id: Date.now() });
      if (history.length > 50) history.length = 50;
      localStorage.setItem('contentGenHistory', JSON.stringify(history));
    }

    function renderHistory() {
      const history = getHistory();
      if (!history.length) {
        historyList.innerHTML = '<p class="text-gray-300 text-sm text-center py-6">No generations yet.</p>';
        return;
      }
      historyList.innerHTML = history.map(h => {
        const date = new Date(h.meta.timestamp);
        const dateStr = date.toLocaleDateString() + ' ' + date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        const preview = h.text.replace(/\s+/g, ' ').substring(0, 70);
        return `
          <div class="history-item" onclick="loadHistory(${h.id})" title="${h.meta.type || 'Content'} - ${dateStr}">
            <div class="text-xs font-semibold text-gray-500 uppercase">${h.meta.type || 'Content'}</div>
            <div class="text-sm text-gray-600 truncate">${preview}...</div>
            <div class="text-xs text-gray-400 mt-0.5">${dateStr} · ${h.meta.model?.split('/')[1] || ''}</div>
          </div>
        `;
      }).join('');
    }

    function loadHistory(id) {
      const history = getHistory();
      const item = history.find(h => h.id === id);
      if (!item) return;
      lastResult = item.text;
      lastMeta = item.meta;
      displayResult(item.text, item.meta);
      // Auto-select the type
      const ct = CONTENT_TYPES.find(t => t.label === item.meta.type);
      if (ct) {
        selectType(ct.id);
        $('input-topic').value = item.meta.topic || '';
        $('input-tone').value = item.meta.tone || 'Professional';
        $('input-length').value = item.meta.length || 'Medium';
        $('input-audience').value = item.meta.audience || '';
        if (item.meta.language) {
          $('sidebar-language').value = item.meta.language;
          $('input-language-form').value = item.meta.language;
        }
      }
    }

    function clearHistory() {
      if (!confirm('Clear all generation history?')) return;
      localStorage.removeItem('contentGenHistory');
      renderHistory();
      showToast('History cleared');
    }

    // ── Toast ──
    function showToast(msg) {
      toastMsg.textContent = msg;
      toast.classList.add('show');
      clearTimeout(window._toastTimer);
      window._toastTimer = setTimeout(() => toast.classList.remove('show'), 2800);
    }

    // ── Scroll button ──
    window.addEventListener('scroll', () => {
      if (window.scrollY > 400) {
        scrollTop.classList.remove('opacity-0', 'invisible');
        scrollTop.classList.add('opacity-100', 'visible');
      } else {
        scrollTop.classList.add('opacity-0', 'invisible');
        scrollTop.classList.remove('opacity-100', 'visible');
      }
    });

    // ── Keyboard shortcuts ──
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter' && e.ctrlKey && selectedType) generate();
      if (e.key === 'Escape') closeSettings();
    });

    // ── Run ──
    document.addEventListener('DOMContentLoaded', () => {
      init();
    });
  </script>
  </script>
</body>
</html>
