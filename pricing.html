<!DOCTYPE html>
<html lang="en">
<head>

    <style>
        body { font-family: 'Inter', sans-serif; color: #333; }
        h1, h2, h3, h4, h5, h6, .serif { font-family: 'Playfair Display', serif; }
        .bg-dark-blue { background-color: #0d152e; }
        .text-dark-blue { color: #0d152e; }
        .bg-primary-red { background-color: #c91414; }
        .text-primary-red { color: #c91414; }
        .border-primary-red { border-color: #c91414; }
        .reveal { opacity:0; transform:translateY(40px); transition:opacity 0.7s ease-out, transform 0.7s ease-out; }
        .reveal.visible { opacity:1; transform:translateY(0); }
        .delay-100 { transition-delay:0.1s; }
        .delay-200 { transition-delay:0.2s; }
        .delay-300 { transition-delay:0.3s; }
        .pricing-card { transition: all 0.3s ease; }
        .pricing-card:hover { transform: translateY(-8px); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .pricing-card.featured { border: 2px solid #c91414; position: relative; }
        .pricing-card.featured::before { content: 'Most Popular'; position: absolute; top: -12px; left: 50%; transform: translateX(-50%); background: #c91414; color: white; padding: 4px 16px; border-radius: 20px; font-size: 11px; font-weight: 600; letter-spacing: 0.5px; }
    </style>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">

</head>
<body class="overflow-x-hidden">
    <div id="header-container"></div>

    <section class="relative bg-[#0d152e] pt-20 pb-32 overflow-hidden">
        <div class="absolute inset-0 z-0">
            <div class="absolute top-20 -left-20 w-80 h-80 bg-primary-red/10 rounded-full blur-3xl"></div>
            <div class="absolute bottom-0 right-0 w-96 h-96 bg-blue-500/10 rounded-full blur-3xl"></div>
        </div>
        <div class="max-w-7xl mx-auto px-4 relative z-10">
            <div class="max-w-3xl">
                <div class="flex items-center text-[10px] text-gray-400 mb-6 uppercase tracking-wider">
                    <span class="hover:text-white cursor-pointer" onclick="window.location='index.html'">Home</span> <span class="mx-2">/</span> <span class="text-white">Pricing</span>
                </div>
                <h1 class="reveal text-5xl md:text-7xl font-bold mb-4 leading-[1.1] serif text-white">Simple, <span class="text-primary-red">Transparent</span> Pricing</h1>
                <p class="reveal delay-100 text-lg text-gray-300 mb-8 leading-relaxed font-light max-w-2xl">Choose the package that fits your needs. All plans include a free consultation and 30-day satisfaction guarantee.</p>
            </div>
        </div>
    </section>

    <section class="py-20 bg-gray-50 -mt-20 relative z-20">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex flex-wrap gap-2 mb-12 justify-center">
                <button class="tab-btn active bg-primary-red text-white px-6 py-2.5 rounded-full text-sm font-bold transition" data-tab="web">Web Development</button>
                <button class="tab-btn bg-white border border-gray-200 text-gray-600 px-6 py-2.5 rounded-full text-sm font-bold hover:bg-gray-100 transition" data-tab="marketing">Digital Marketing</button>
                <button class="tab-btn bg-white border border-gray-200 text-gray-600 px-6 py-2.5 rounded-full text-sm font-bold hover:bg-gray-100 transition" data-tab="ai">AI Automation</button>
                <button class="tab-btn bg-white border border-gray-200 text-gray-600 px-6 py-2.5 rounded-full text-sm font-bold hover:bg-gray-100 transition" data-tab="mobile">Mobile Apps</button>
            </div>

            <div id="pricingContent">
            </div>
        </div>
    </section>

    <section class="py-20 bg-white">
        <div class="max-w-4xl mx-auto px-4 text-center">
            <div class="reveal">
                <h2 class="text-3xl md:text-5xl font-bold mb-6 serif">Not Sure What You Need?</h2>
                <p class="text-gray-500 mb-8 text-lg">Book a free 30-minute consultation and we'll recommend the perfect solution.</p>
                <a href="contact.html" class="bg-primary-red text-white px-8 py-4 rounded-lg font-bold hover:bg-red-800 transition inline-flex items-center gap-2 shadow-lg">
                    <i class="fas fa-calendar-alt"></i> Book Free Consultation
                </a>
            </div>
        </div>
    </section>

    <div id="footer-container"></div>

<script>
const mobileMenuBtn = document.getElementById('mobileMenuBtn');
const mobileMenu = document.getElementById('mobileMenu');
if (mobileMenuBtn && mobileMenu) {
    mobileMenuBtn.addEventListener('click', () => {
        mobileMenu.classList.toggle('hidden');
        const icon = mobileMenuBtn.querySelector('i');
        icon.className = mobileMenu.classList.contains('hidden') ? 'fas fa-bars fa-lg' : 'fas fa-times fa-lg';
    });
}
</script>

<script>
const pricingData = {
    web: {
        plans: [
            { name: 'Starter', price: '$999', desc: 'Perfect for small businesses getting started online.', features: ['5-page responsive website', 'Contact form integration', 'Basic SEO setup', 'Mobile optimized', '1 month support'], cta: 'Get Started' },
            { name: 'Business', price: '$2,499', desc: 'For growing businesses that need a professional edge.', features: ['10-page responsive website', 'CMS integration', 'Advanced SEO', 'E-commerce ready', 'Social media integration', '3 months support', 'Performance optimization'], cta: 'Get Started', featured: true },
            { name: 'Enterprise', price: '$5,999+', desc: 'Custom solutions for large-scale projects and platforms.', features: ['Unlimited pages', 'Custom web application', 'API integrations', 'Advanced analytics', 'Dedicated project manager', '12 months support', 'Priority 24/7 support'], cta: 'Contact Us' }
        ]
    },
    marketing: {
        plans: [
            { name: 'Starter', price: '$799/mo', desc: 'Essential marketing to build your online presence.', features: ['Social media management (2 platforms)', 'Monthly content calendar', 'Basic reporting', 'Email newsletter setup'], cta: 'Get Started' },
            { name: 'Growth', price: '$1,499/mo', desc: 'Comprehensive marketing to accelerate growth.', features: ['Social media (4 platforms)', 'Content creation (8 posts/mo)', 'SEO optimization', 'PPC campaign management', 'Monthly analytics report', 'A/B testing'], cta: 'Get Started', featured: true },
            { name: 'Scale', price: '$3,499/mo', desc: 'Full-scale marketing domination.', features: ['All platforms management', 'Daily content creation', 'Advanced SEO + link building', 'Multi-channel PPC', 'Custom analytics dashboard', 'Dedicated strategist', '24/7 support'], cta: 'Contact Us' }
        ]
    },
    ai: {
        plans: [
            { name: 'Chatbot Basic', price: '$2,500', desc: 'Simple AI chatbot for common customer queries.', features: ['FAQ automation', 'Basic NLP', 'Website integration', 'Monthly updates'], cta: 'Get Started' },
            { name: 'AI Agent Pro', price: '$8,500', desc: 'Advanced multi-agent system for complex workflows.', features: ['Multi-agent architecture', 'Lead qualification', 'CRM integration', 'Analytics dashboard', 'Priority support', 'Quarterly optimization'], cta: 'Get Started', featured: true },
            { name: 'Enterprise AI', price: '$25,000+', desc: 'Custom AI automation for enterprise operations.', features: ['Custom AI pipeline', 'Process automation', 'All integrations', 'Dedicated AI engineer', '24/7 monitoring', 'Monthly retraining'], cta: 'Contact Us' }
        ]
    },
    mobile: {
        plans: [
            { name: 'MVP', price: '$15,000', desc: 'Minimum viable product to validate your idea.', features: ['iOS or Android', 'Core features only', 'Basic UI/UX design', 'App store submission'], cta: 'Get Started' },
            { name: 'Full App', price: '$40,000', desc: 'Feature-rich app with cross-platform reach.', features: ['iOS + Android (React Native)', 'Full UI/UX design', 'API integrations', 'Push notifications', 'Analytics', '3 months support'], cta: 'Get Started', featured: true },
            { name: 'Enterprise', price: '$100,000+', desc: 'Large-scale app with backend infrastructure.', features: ['Native iOS + Android', 'Custom backend', 'Real-time features', 'AI/ML integration', 'Scalable architecture', '12 months support'], cta: 'Contact Us' }
        ]
    }
};

function renderPricing(tab) {
    const data = pricingData[tab];
    const container = document.getElementById('pricingContent');
    container.innerHTML = `<div class="grid grid-cols-1 md:grid-cols-3 gap-8 max-w-6xl mx-auto">${data.plans.map(p => `
        <div class="pricing-card bg-white rounded-2xl shadow-sm border border-gray-200 p-8 flex flex-col ${p.featured ? 'featured' : ''}">
            <h3 class="text-xl font-bold text-dark-blue mb-1">${p.name}</h3>
            <p class="text-sm text-gray-400 mb-4">${p.desc}</p>
            <div class="text-4xl font-bold text-dark-blue mb-6">${p.price} <span class="text-sm font-normal text-gray-400">${p.price.includes('/') ? '' : 'one-time'}</span></div>
            <ul class="space-y-3 mb-8 flex-1">${p.features.map(f => `<li class="flex items-start gap-3 text-sm text-gray-600"><i class="fas fa-check-circle text-green-500 mt-0.5"></i> ${f}</li>`).join('')}</ul>
            <a href="contact.html" class="block text-center w-full py-3 rounded-xl font-bold transition ${p.featured ? 'bg-primary-red text-white hover:bg-red-800' : 'bg-gray-50 text-dark-blue hover:bg-gray-100'}">${p.cta} <i class="fas fa-arrow-right ml-1.5 text-xs"></i></a>
        </div>`).join('')}</div>`;
}

document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => {
            b.classList.remove('active', 'bg-primary-red', 'text-white');
            b.classList.add('bg-white', 'border', 'border-gray-200', 'text-gray-600');
        });
        btn.classList.add('active', 'bg-primary-red', 'text-white');
        btn.classList.remove('bg-white', 'border', 'border-gray-200', 'text-gray-600');
        renderPricing(btn.dataset.tab);
    });
});

renderPricing('web');
</script>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const revealObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) entry.target.classList.add('visible');
        });
    }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });
    document.querySelectorAll('.reveal, .reveal-left, .reveal-right, .reveal-scale').forEach(el => {
        revealObserver.observe(el);
    });
});
</script>
</body>
</html>
