<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Free bulk link opener tool by SwitDeveloper - Open multiple URLs at once in new tabs. Paste, open, and go.">
    <meta name="keywords" content="bulk link opener, open multiple URLs, multi URL opener, tab opener, free browser tool">
    <title>Bulk Link Opener - Open Multiple URLs | SwitDeveloper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <script src="js/load-partials.js"></script>
</head>
<body class="overflow-x-hidden">
    <div id="header-container"></div>

    <section class="py-16 bg-gray-50">
        <div class="max-w-4xl mx-auto px-4">
            <h1 class="text-3xl font-bold text-center mb-6">Bulk Link Opener</h1>
            <p class="text-center text-gray-600 mb-6">Paste one URL per line, then click "Open Links" to open each in a new tab.</p>
            <textarea id="urls" rows="6" placeholder="https://example.com
https://github.com
..." class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-primary-red/20 focus:border-primary-red resize-none"></textarea><br>
            <button onclick="openLinks()" class="bg-primary-red text-white px-8 py-3 rounded-xl font-bold hover:bg-red-800 transition flex items-center gap-2 shadow-sm mx-auto block">
                <i class="fas fa-external-link-alt"></i> Open Links
            </button>
            <div class="note mt-4 text-center text-sm text-gray-500">
                Note: Your browser may block pop-ups. Allow pop-ups for this site to let links open in new tabs.
            </div>
        </div>
    </section>

    <div id="footer-container"></div>

    <script>
        function openLinks() {
            const textarea = document.getElementById('urls');
            const text = textarea.value.trim();
            if (!text) {
                alert('Please enter at least one URL.');
                return;
            }
            const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
            lines.forEach(url => {
                // Ensure URL has a scheme; if not, prepend http://
                if (!/^https?:\/\//i.test(url)) {
                    url = 'http://' + url;
                }
                window.open(url, '_blank');
            Kanpo
        }
    </script>
</body>
</html>
