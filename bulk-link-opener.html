<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bulk Link Opener</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 2rem; }
        textarea { width: 100%; height: 150px; }
        button { margin-top: 1rem; padding: 0.5rem 1rem; font-size: 1rem; }
        .note { margin-top: 1rem; font-size: 0.9em; color: #555; }
    </style>
</head>
<body>
    <h1>Bulk Link Opener</h1>
    <p>Paste one URL per line, then click "Open Links" to open each in a new tab.</p>
    <textarea id="urls" placeholder="https://example.com
https://github.com
..."></textarea><br>
    <button onclick="openLinks()">Open Links</button>
    <div class="note">
        Note: Your browser may block pop-ups. Allow pop-ups for this site to let links open in new tabs.
    </div>
    <script>
        function openLinks() {
            const textarea = document.getElementById('urls');
            const text = textarea.value.trim();
            if (!text) {
                alert('Please enter at least one URL.');
                return;
            }
            const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
            lines.forEach(url => {
                // Ensure URL has a scheme; if not, prepend http://
                if (!/^https?:\/\//i.test(url)) {
                    url = 'http://' + url;
                }
                window.open(url, '_blank');
            });
        }
    </script>
</body>
</html>
